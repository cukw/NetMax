name: Build All Platforms

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: build-all-platforms-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: 3.38.5

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Backend Pub Get
        run: |
          cd backend
          dart pub get

      - name: Analyze Backend
        run: |
          cd backend
          dart analyze

      - name: Test
        run: flutter test

  build-android:
    name: Build Android APK
    needs: quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 14

  build-linux:
    name: Build Linux Bundle
    needs: quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Package Linux Artifact
        run: tar -czf netmax-linux-x64.tar.gz -C build/linux/x64/release bundle

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundle
          path: netmax-linux-x64.tar.gz
          if-no-files-found: error
          retention-days: 14

  build-windows:
    name: Build Windows Bundle
    needs: quality
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Package Windows Artifact
        shell: pwsh
        run: Compress-Archive -Path "build/windows/x64/runner/Release/*" -DestinationPath "netmax-windows-x64.zip" -Force

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundle
          path: netmax-windows-x64.zip
          if-no-files-found: error
          retention-days: 14

  build-apple:
    name: Build Apple Bundles
    needs: quality
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Package macOS Artifact
        run: ditto -c -k --sequesterRsrc --keepParent "build/macos/Build/Products/Release/netmax_messenger.app" "netmax-macos.app.zip"

      - name: Build iOS (Unsigned)
        run: flutter build ios --release --no-codesign

      - name: Package iOS Artifact
        run: ditto -c -k --sequesterRsrc --keepParent "build/ios/iphoneos/Runner.app" "netmax-ios.app.zip"

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: netmax-macos.app.zip
          if-no-files-found: error
          retention-days: 14

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-unsigned
          path: netmax-ios.app.zip
          if-no-files-found: error
          retention-days: 14
